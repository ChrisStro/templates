x-default: &default
  restart: 'unless-stopped'
  logging:
    driver: 'json-file'
    options:
      max-size: '500m'
      max-file: '2'

services:
  valkey:
    <<: *default
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning
    networks:
      - searxng-internal
    volumes:
      - valkey-data:/data
  searxng:
    <<: *default
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    networks:
      - searxng-internal
      - proxy_network
    volumes:
      - searxng-config:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=https://$PUBLIC_HOSTNAME/
      - SEARXNG_SECRET_KEY=$SEARXNG_SECRET_KEY
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=$PROXY_NETWORK"
      - "traefik.http.routers.searxng.rule=Host(`$PUBLIC_HOSTNAME`)"
      - "traefik.http.routers.searxng.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}"      
      - "traefik.http.services.searxng.loadbalancer.server.port=8080"
    depends_on:
      - valkey

networks:
  searxng-internal:
  proxy_network:
    name: $PROXY_NETWORK
    external: true

volumes:
  valkey-data:
  searxng-config:
