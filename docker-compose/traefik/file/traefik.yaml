entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
    transport:
      respondingTimeouts:
        readTimeout: "30m"
    http:
      tls:
        certResolver: "letsencrypt"
        options: "default"
        domains:
          - main: "example.com"
            sans:
              - "*.example.com"

serversTransport:
  insecureSkipVerify: true

ping:
  entryPoint: "web"