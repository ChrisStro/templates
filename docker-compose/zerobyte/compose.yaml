x-default: &default
  restart: 'always'
  logging:
    driver: 'json-file'
    options:
      max-size: '500m'
      max-file: '2'

services:
  zerobyte:
    <<: *default
    image: ghcr.io/nicotsx/zerobyte:latest
    container_name: zerobyte
    networks:
      - proxy_network
    cap_add:
      - SYS_ADMIN
    privileged: true # needed for docker backups
    #ports:
    #  - "4096:4096"
    #devices:
    #  - /dev/fuse:/dev/fuse
    env_file:
      - .env
    environment:
      - TZ=Europe/Berlin
      - BASE_URL=https://$PUBLIC_HOSTNAME
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS:-https://$PUBLIC_HOSTNAME}
      - TRUST_PROXY=${TRUST_PROXY:-true}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - APP_SECRET=$APP_SECRET
      # - RCLONE_CONFIG_DIR=/root/.config/rclone
      # - RESTIC_HOSTNAME=zerobyte
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - zerobyte_data:/var/lib/zerobyte
      - /mnt:/mnt
      - /opt/stacks:/opt/stacks
      #- ~/.config/rclone:/root/.config/rclone # rclone config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zerobyte.rule=Host(`$PUBLIC_HOSTNAME`)"
      - "traefik.http.services.zerobyte.loadbalancer.server.port=4096"
      - "traefik.http.routers.zerobyte.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}"

volumes:
  zerobyte_data:

networks:
  proxy_network:
    name: $PROXY_NETWORK
    external: true