ipam:
  mode: kubernetes

k8sServiceHost: 10.122.57.80
k8sServicePort: 6443

kubeProxyReplacement: true

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

l2announcements:
  enabled: true

ingressController:
  enabled: false
  loadbalancerMode: shared

gatewayAPI:
  enabled: true

# Enable Hubble UI
hubble:
  relay:
    enabled: true
  ui:
    enabled: true
